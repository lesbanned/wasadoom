<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #dos { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <div id="dos"></div>
    <script src="https://js-dos.com/cdn/js-dos-api.js"></script>
    <script>
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();
        }
        
        const dosDiv = document.getElementById("dos");
        Dos(dosDiv).ready((fs, main) => {
            // Скачиваем shareware DOOM
            fetch("https://www.gamers.org/pub/idgames/games/edits/levels/doom1/ports/d-f/doom1_9.zip")
                .then(r => r.arrayBuffer())
                .then(data => {
                    fs.writeFile("DOOM.ZIP", data);
                    main(["-file", "DOOM.ZIP"]);
                });
        });
    </script>
</body>
</html>
